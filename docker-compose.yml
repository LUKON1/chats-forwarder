services:
  bot-engine:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
    volumes:
      - bot-data:/app/apps/bot-engine/data
    expose:
      - "4000"
    env_file:
      - .env
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      args:
        - BACKEND_URL=http://bot-engine:4000
    expose:
      - "3000"
    environment:
      - BACKEND_URL=http://bot-engine:4000
    restart: unless-stopped

volumes:
  bot-data: