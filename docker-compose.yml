services:
  bot-engine-api:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
    expose:
      - "4000"
    ports:
      - "4000:4000"
    environment:
      - RUN_MODE=api
    env_file:
      - .env
    networks:
      - app
      - db
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
  
  bot-engine-worker:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
    environment:
      - RUN_MODE=worker
    env_file:
      - .env
    networks:
      - app
      - db
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
  
  redis:
    image: redis:8-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - db
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
      - POSTGRES_DB=${POSTGRES_DB:-chat_forwarder}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - db
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      args:
        - BACKEND_URL=http://bot-engine-api:4000
    expose:
      - "3000"
    environment:
      - BACKEND_URL=http://bot-engine-api:4000
    depends_on:
      - bot-engine-api
    networks:
      - app
    restart: unless-stopped

    
networks:
  app:
    driver: bridge
  db:
    driver: bridge
    internal: true

volumes:
  redis-data:
  postgres-data: