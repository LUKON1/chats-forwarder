services:
  bot-engine:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: runner
    expose:
      - "4000"
    network_mode: host
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      target: runner
    expose:
      - "3000"
    network_mode: host
    environment:
      - BACKEND_URL=http://localhost:4000
    depends_on:
      - bot-engine
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379" # Exposed to host so host network mode bot-engine can connect to localhost
    volumes:
      - redis-data-local:/data
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432" # Exposed to host so host network mode bot-engine can connect to localhost
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
      - POSTGRES_DB=${POSTGRES_DB:-chat_forwarder}
    volumes:
      - postgres-data-local:/var/lib/postgresql
    restart: unless-stopped

volumes:
  redis-data-local:
  postgres-data-local:
