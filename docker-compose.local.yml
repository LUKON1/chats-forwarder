services:
  bot-engine:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: runner
    volumes:
      - bot-data-local:/app/apps/bot-engine/data
    expose:
      - "4000"
    network_mode: host
    env_file:
      - .env
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      target: runner
    expose:
      - "3000"
    network_mode: host
    environment:
      - BACKEND_URL=http://localhost:4000
    depends_on:
      - bot-engine
    restart: unless-stopped

volumes:
  bot-data-local:
