services:
  bot-engine-api:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: runner
    expose:
      - "4000"
    ports:
      - "4000:4000"
    environment:
      - RUN_MODE=api
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-chat_forwarder}?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    networks:
      - app
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  bot-engine-worker:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: runner
    environment:
      - RUN_MODE=worker
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-chat_forwarder}?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    networks:
      - app
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      target: runner
      args:
        - BACKEND_URL=http://bot-engine-api:4000
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://bot-engine-api:4000
    depends_on:
      - bot-engine-api
    networks:
      - app
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data-local:/data
    networks:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
      - POSTGRES_DB=${POSTGRES_DB:-chat_forwarder}
    volumes:
      - postgres-data-local:/var/lib/postgresql
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  redis-data-local:
  postgres-data-local:
