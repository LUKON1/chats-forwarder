services:
  bot-engine:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: dev
    network_mode: host
    volumes:
      # Mount the whole repository for live-reload
      - .:/app
      # Preserve container node_modules from being overridden by the host
      - /app/node_modules
      - /app/apps/bot-engine/node_modules
    expose:
      - "4000"
    env_file:
      - .env
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      target: dev
    network_mode: host
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/admin-ui/node_modules
      - /app/apps/admin-ui/.next  
    expose:
      - "3000"
    environment:
      - BACKEND_URL=http://localhost:4000
    depends_on:
      - bot-engine
    restart: unless-stopped
