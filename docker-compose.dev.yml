services:
  bot-engine-api:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: dev
    expose:
      - "4000"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/bot-engine/node_modules
    environment:
      - RUN_MODE=api
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-chat_forwarder}?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    networks:
      - app
      - db
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  bot-engine-worker:
    build:
      context: .
      dockerfile: apps/bot-engine/Dockerfile
      target: dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/bot-engine/node_modules
    environment:
      - RUN_MODE=worker
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-chat_forwarder}?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    networks:
      - app
      - db
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      target: dev
    expose:
      - "3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/admin-ui/node_modules
      - /app/apps/admin-ui/.next  
    environment:
      - BACKEND_URL=http://bot-engine-api:4000
    depends_on:
      - bot-engine-api
    networks:
      - app
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - db
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
      - POSTGRES_DB=${POSTGRES_DB:-chat_forwarder}
    volumes:
      - postgres-data-dev:/var/lib/postgresql
    networks:
      - db
    restart: unless-stopped

networks:
  app:
    driver: bridge
  db:
    driver: bridge
    internal: true

volumes:
  redis-data-dev:
  postgres-data-dev:
